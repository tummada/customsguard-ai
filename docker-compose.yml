x-logging: &default-logging
  driver: "json-file"
  options: { max-size: "10m", max-file: "3" }

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: saas-db
    restart: always
    oom_score_adj: -500
    shm_size: 1gb
    security_opt: [no-new-privileges:true]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_saas_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 2048M }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: always
    security_opt: [no-new-privileges:true]
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    deploy:
      resources:
        limits: { cpus: '0.15', memory: 512M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  backend:
    build: ./backend-core
    container_name: saas-backend
    restart: always
    security_opt: [no-new-privileges:true]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_ENV}
      - DB_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - AWS_REGION=${S3_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - MAIL_HOST=${SMTP_HOST}
      - MAIL_PORT=${SMTP_PORT}
      - MAIL_USERNAME=${SMTP_USER}
      - MAIL_PASSWORD=${SMTP_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
    tmpfs: /tmp
    deploy:
      resources:
        limits: { cpus: '0.6', memory: 1536M, pids: 500 }
    logging: *default-logging

  n8n:
    image: n8nio/n8n:latest
    container_name: saas-n8n
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - N8N_MODE=queue
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=${APP_BASE_URL}/n8n/
      - N8N_WEBHOOK_URL=${APP_BASE_URL}/n8n/
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 512M }
    logging: *default-logging

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: saas-n8n-worker
    command: worker
    restart: always
    # [FIXED] เพิ่มความเสถียรตามคำแนะนำหัวหน้า
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    tmpfs: /tmp
    environment:
      - N8N_MODE=queue
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=${APP_BASE_URL}/n8n/
      - N8N_WEBHOOK_URL=${APP_BASE_URL}/n8n/
    deploy:
      resources:
        limits: { cpus: '0.25', memory: 1536M }
    logging: *default-logging

  marketing:
    build: ./marketing-site
    container_name: saas-marketing
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      - NODE_ENV=${APP_ENV}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - NEXT_PUBLIC_API_URL=https://api.vollos.ai
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 256M }
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: saas-proxy
    restart: always
    security_opt: [no-new-privileges:true]
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend-app/dist:/usr/share/nginx/html:ro
    depends_on:
      backend: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 256M }
    logging: *default-logging