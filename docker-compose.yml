version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options: { max-size: "10m", max-file: "3" }

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-db
    restart: always
    oom_score_adj: -500
    shm_size: 1gb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_saas_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    deploy:
      resources:
        limits: { cpus: '0.4', memory: 1536M }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    deploy:
      resources:
        limits: { cpus: '0.2', memory: 512M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  backend:
    build: ./backend-core
    container_name: saas-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
    pids_limit: 500
    tmpfs: /tmp
    deploy:
      resources:
        limits: { cpus: '0.6', memory: 1024M }
    logging: *default-logging

  n8n:
    image: n8nio/n8n:latest
    container_name: saas-n8n
    environment:
      - N8N_MODE=queue
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 512M }
    logging: *default-logging

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: saas-n8n-worker
    command: worker
    restart: always
    # [FIXED] เพิ่มความเสถียรตามคำแนะนำหัวหน้า
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    tmpfs: /tmp
    environment:
      - N8N_MODE=queue
      - N8N_REDIS_HOST=redis
      - N8N_REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits: { cpus: '0.4', memory: 1536M }
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: saas-proxy
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend-app/dist:/usr/share/nginx/html:ro
    depends_on:
      backend: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 256M }
    logging: *default-logging