# ==============================================================================
# VOLLOS Production Stack — vollos.ai
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# ==============================================================================

x-logging: &default-logging
  driver: "json-file"
  options: { max-size: "10m", max-file: "5" }

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vollos-db
    restart: always
    oom_score_adj: -500
    shm_size: 512mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 2048M }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: vollos-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits: { cpus: '0.15', memory: 512M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s

  minio:
    image: minio/minio:latest
    container_name: vollos-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    deploy:
      resources:
        limits: { cpus: '0.15', memory: 256M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s

  minio-init:
    image: minio/mc:latest
    container_name: vollos-minio-init
    depends_on:
      minio: { condition: service_healthy }
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET_NAME};
      echo 'Bucket ${S3_BUCKET_NAME} ready';
      "

  backend:
    image: ${CI_REGISTRY_IMAGE:-registry.gitlab.com/tummadajingjing/aiservice}/backend:${IMAGE_TAG:-latest}
    container_name: vollos-backend
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_ACCESS_TOKEN_EXPIRATION_MS}
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - AWS_REGION=${S3_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_ENDPOINT=http://minio:9000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    tmpfs: /tmp
    deploy:
      resources:
        limits: { cpus: '0.6', memory: 1024M, pids: 500 }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      start_period: 60s

  marketing:
    image: ${CI_REGISTRY_IMAGE:-registry.gitlab.com/tummadajingjing/aiservice}/marketing:${IMAGE_TAG:-latest}
    container_name: vollos-marketing
    restart: always
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 256M }
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: vollos-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 128M }
    logging: *default-logging

  # Daily DB backup at 3am
  db-backup:
    image: pgvector/pgvector:pg16
    container_name: vollos-db-backup
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./data/backups:/backups
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME}
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 256M }
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    entrypoint: >
      /bin/sh -c 'while true; do
        sleep 3600;
        HOUR=$$(date +%H);
        if [ "$$HOUR" = "03" ]; then
          pg_dump -Fc | gzip > /backups/vollos_$$(date +%Y%m%d_%H%M).dump.gz;
          find /backups -name "*.dump.gz" -mtime +7 -delete;
          echo "[BACKUP] Done: $$(date)";
          sleep 82800;
        fi;
      done'
