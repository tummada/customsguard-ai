openapi: 3.0.3
info:
  title: AI-SaaS World-Class API
  description: |
    API สำหรับให้บริการ AI Image/Video Generation ภายใต้สถาปัตยกรรม Multi-tenant 
    รองรับระบบ Credit Ledger, SSE Real-time Updates และ Idempotency 
    ออกแบบมาเพื่อประสิทธิภาพสูงสุดบนทรัพยากรจำกัด (RAM 8GB)
  version: 1.1.0
  contact:
    name: System Architect Agent
    email: architect@your-ai-saas.com

servers:
  - url: https://api.your-ai-saas.com/v1
    description: Production Server

# --- Security Definition ---
security:
  - bearerAuth: []

# --- Global Components ---
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      description: UUID v7 ของ Workspace (ต้องตรงกับ JWT Claim 'tenants')
      schema:
        type: string
        format: uuid
    
    IdempotencyKeyHeader:
      name: X-Idempotency-Key
      in: header
      required: false
      description: ป้องกันการทำรายการซ้ำสำหรับ POST/PUT requests
      schema:
        type: string

  headers:
    RateLimit-Limit:
      description: โควตาสูงสุดของ Tenant ในหน้าต่างเวลานี้
      schema: { type: integer }
    RateLimit-Remaining:
      description: จำนวน Request ที่เหลือที่สามารถใช้ได้
      schema: { type: integer }
    RateLimit-Reset:
      description: เวลาที่โควตาจะถูกรีเซ็ต (Unix Timestamp)
      schema: { type: integer }

  schemas:
    # --- RFC 7807 Error Model ---
    ProblemDetail:
      type: object
      properties:
        type: { type: string, format: uri, example: "https://api.your-ai-saas.com/errors/insufficient-credits" }
        title: { type: string, example: "Insufficient Credits" }
        status: { type: integer, example: 403 }
        detail: { type: string, example: "Your balance is 5, but the job requires 10 credits." }
        instance: { type: string, example: "/v1/jobs" }

    # --- Pagination Model ---
    PageInfo:
      type: object
      properties:
        total_elements: { type: integer, example: 125 }
        total_pages: { type: integer, example: 7 }
        current_page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
        has_next: { type: boolean, example: true }

    # --- Job Models ---
    JobRequest:
      type: object
      required: [prompt, model_type]
      properties:
        prompt: { type: string, maxLength: 2000 }
        model_type: { type: string, enum: [FLUX_DEV, SD_3_5, COMFY_VIDEO] }
        aspect_ratio: { type: string, default: "1:1" }
        settings: { type: object, description: "Advanced AI parameters" }

    JobResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [CREATED, QUEUED, PROCESSING, COMPLETED, FAILED, STALLED] }
        progress: { type: integer, minimum: 0, maximum: 100, example: 45 }
        credits_reserved: { type: integer }
        output_urls: { type: array, items: { type: string, format: uri } }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    # --- Billing Models ---
    BalanceInfo:
      type: object
      properties:
        tenant_id: { type: string, format: uuid }
        available_balance: { type: integer }
        reserved_balance: { type: integer }
        currency: { type: string, default: "CREDITS" }

# --- API Endpoints ---
paths:
  /jobs:
    get:
      summary: ดึงรายการประวัติงาน AI (Paginated)
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20, maximum: 50 }
      responses:
        '200':
          description: OK
          headers:
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimit-Remaining' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/JobResponse' } }
                  page_info: { $ref: '#/components/schemas/PageInfo' }

    post:
      summary: สร้างงาน AI ใหม่ (Async)
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobRequest' }
      responses:
        '202':
          description: Accepted (Job Queued)
          headers:
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimit-Remaining' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobResponse' }
        '403':
          description: Forbidden (Insufficient Credits / Invalid Tenant)
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetail' }

  /jobs/{id}:
    get:
      summary: ดึงสถานะงานรายตัว (Polling Fallback)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobResponse' }

  /jobs/stream:
    get:
      summary: รับการแจ้งเตือนสถานะ Real-time (SSE)
      description: เปิด Connection ทิ้งไว้เพื่อรับ Push Notification เมื่อสถานะ Job เปลี่ยน
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: SSE Stream established
          content:
            text/event-stream:
              schema: { type: string, example: "data: {\"id\": \"...\", \"status\": \"PROCESSING\", \"progress\": 50}" }

  /billing/balance:
    get:
      summary: เช็คยอดเงินคงเหลือและยอดที่ถูกจองไว้
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BalanceInfo' }

  /webhooks/stripe:
    post:
      summary: ช่องทางรับ Event จาก Stripe (Top-up)
      security: [] # Stripe ใช้ Signature Validation แทน Bearer
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Webhook Processed