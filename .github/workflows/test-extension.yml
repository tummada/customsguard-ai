name: Chrome Extension Tests

on:
  push:
    paths:
      - "chrome-extension/cgai/**"
      - "backend-core/**"
      - "test-data/**"
      - ".github/workflows/test-extension.yml"
  pull_request:
    paths:
      - "chrome-extension/cgai/**"
      - "backend-core/**"
      - "test-data/**"

# ---------------------------------------------------------------------------
# Job 1: Unit tests (fast, no infra needed)
# ---------------------------------------------------------------------------
jobs:
  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension/cgai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chrome-extension/cgai/package-lock.json

      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # Job 2: Backend API E2E (requires Docker infra + backend)
  # ---------------------------------------------------------------------------
  e2e-api:
    runs-on: ubuntu-latest
    needs: unit-test
    defaults:
      run:
        working-directory: chrome-extension/cgai

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_saas_db
          POSTGRES_USER: saas_admin
          POSTGRES_PASSWORD: dev_password_2024
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas_admin -d ai_saas_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USERNAME: saas_admin
      DB_PASSWORD: dev_password_2024
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_saas_db
      SPRING_REDIS_HOST: localhost
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chrome-extension/cgai/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=dev_password_2024 psql -h localhost -U saas_admin -d ai_saas_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Start backend (background)
        working-directory: backend-core
        run: |
          ./gradlew :platform-app:bootRun &
          echo "Waiting for backend to start..."

      - name: Wait for backend ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/v1/auth/dev-token -X POST > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 2
          done
          # Final check
          curl -sf http://localhost:8080/v1/auth/dev-token -X POST || (echo "Backend failed to start" && exit 1)

      - run: npm ci

      - name: Run API E2E tests
        env:
          E2E_BASE_URL: http://localhost:8080
          DB_CONTAINER: ""
        run: npm run test:e2e:api

  # ---------------------------------------------------------------------------
  # Job 3: Extension E2E (Playwright + Chrome extension loading)
  # ---------------------------------------------------------------------------
  e2e-extension:
    runs-on: ubuntu-latest
    needs: e2e-api
    defaults:
      run:
        working-directory: chrome-extension/cgai

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_saas_db
          POSTGRES_USER: saas_admin
          POSTGRES_PASSWORD: dev_password_2024
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas_admin -d ai_saas_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USERNAME: saas_admin
      DB_PASSWORD: dev_password_2024
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_saas_db
      SPRING_REDIS_HOST: localhost
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chrome-extension/cgai/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=dev_password_2024 psql -h localhost -U saas_admin -d ai_saas_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Start backend (background)
        working-directory: backend-core
        run: |
          ./gradlew :platform-app:bootRun &
          echo "Waiting for backend to start..."

      - name: Wait for backend ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/v1/auth/dev-token -X POST > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/v1/auth/dev-token -X POST || (echo "Backend failed to start" && exit 1)

      - run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Extension E2E tests
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e:ext

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: chrome-extension/cgai/test-results/
          retention-days: 7
