# --- Upstream Definitions (The Performance Engine) ---
upstream backend_server {
    server backend:8080;
    keepalive 32; 
}

upstream n8n_server {
    server saas-n8n:5678;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost;

    # Resource Shield (ป้องกันไฟล์ใหญ่เกินกิน RAM)
    client_max_body_size 10M; 
    client_body_buffer_size 128k; # [NEW] ป้องกันการเขียน Temp file ลง Disk
    server_tokens off; 

    # Security Headers (Manifesto v1.2 Compliance)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Health Check (Internal Monitor)
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # 1. Frontend Static Files (Angular 21 Zoneless)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache Strategy for 8GB Server
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Backend API (V1 Standard)
    location /v1/ {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # [NEW] สำคัญมากสำหรับ Redirects
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 3. SSE Endpoint (The Real-time Lifeblood)
    location /v1/jobs/stream {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; 
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header Host $host;
        
        proxy_buffering off; 
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        proxy_read_timeout 3600s; 
        access_log off; 
    }

    # 4. n8n UI / WebSockets
    location /n8n/ {
        proxy_pass http://n8n_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket Support (Hardened)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Error Pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}