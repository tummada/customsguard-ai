spring:
  application:
    name: vollos-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_saas_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 8
      leak-detection-threshold: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:5s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:3s}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  cache:
    type: redis
  jackson:
    serialization:
      write-dates-as-timestamps: false

gemini:
  api-key: ${GEMINI_API_KEY:}
  embedding:
    model: gemini-embedding-001
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent
    dimensions: 768
  chat:
    model: gemini-2.5-flash
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

s3:
  access-key-id: ${AWS_ACCESS_KEY_ID:minioadmin}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:minioadmin}
  bucket-name: ${S3_BUCKET_NAME:vollos-dev}
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  region: ${AWS_REGION:auto}

jwt:
  secret: ${JWT_SECRET:}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

customsguard:
  chat-guard:
    max-requests-per-minute: ${CHATGUARD_RATE_LIMIT:20}
  scan:
    high-confidence-threshold: ${SCAN_HIGH_CONFIDENCE:0.95}
    semantic-min-threshold: ${SCAN_SEMANTIC_MIN:0.65}
    disclaimer-threshold: ${SCAN_DISCLAIMER:0.80}
  rag:
    min-similarity-threshold: ${RAG_MIN_SIMILARITY:0.65}
    hs-code-similarity-threshold: ${RAG_HS_SIMILARITY:0.55}
    disclaimer-threshold: ${RAG_DISCLAIMER:0.70}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
