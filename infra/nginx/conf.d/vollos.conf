# ============================================================
# VOLLOS — Nginx Reverse Proxy (vollos.ai)
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=scan:10m rate=5r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name vollos.ai api.vollos.ai;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API — api.vollos.ai
server {
    listen 443 ssl;
    http2 on;
    server_name api.vollos.ai;

    ssl_certificate /etc/letsencrypt/live/vollos.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vollos.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Health check (no rate limit)
    location /actuator/health {
        proxy_pass http://backend:8080;
    }

    # PDF scan endpoint (stricter rate limit)
    location /v1/customsguard/scan {
        limit_req zone=scan burst=3 nodelay;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming (RAG)
    location /v1/customsguard/rag/stream {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # All other API endpoints
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Marketing site — vollos.ai
server {
    listen 443 ssl;
    http2 on;
    server_name vollos.ai;

    ssl_certificate /etc/letsencrypt/live/vollos.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vollos.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Marketing site (Next.js)
    location / {
        proxy_pass http://marketing:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
