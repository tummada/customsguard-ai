<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จำลองหน้าเว็บกรมศุลกากร - Mock</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; color: #333; }
      .header { background: #1a3c6e; color: white; padding: 12px 24px; }
      .header h1 { font-size: 16px; font-weight: 600; }
      .header p { font-size: 11px; color: #a0b4d0; }
      .container { max-width: 900px; margin: 20px auto; padding: 0 16px; }
      .card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 20px; margin-bottom: 16px; }
      .card h2 { font-size: 14px; color: #1a3c6e; border-bottom: 2px solid #1a3c6e; padding-bottom: 8px; margin-bottom: 16px; }
      .form-row { display: flex; gap: 16px; margin-bottom: 12px; }
      .form-group { flex: 1; }
      .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }
      .form-group input, .form-group select {
        width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px;
        font-size: 13px; background: #fafbfc;
      }
      .form-group input:focus { outline: none; border-color: #1a3c6e; box-shadow: 0 0 0 2px rgba(26,60,110,0.1); }
      .badge { display: inline-block; background: #e8f0fe; color: #1a3c6e; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
      iframe { width: 100%; height: 280px; border: 1px solid #ccc; border-radius: 4px; }
      .footer { text-align: center; padding: 16px; font-size: 11px; color: #999; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ระบบพิธีการศุลกากรอิเล็กทรอนิกส์ (Mock)</h1>
      <p>Thai Customs e-Customs System — สำหรับทดสอบ VOLLOS Extension เท่านั้น</p>
    </div>

    <div class="container">
      <div class="card">
        <h2>ข้อมูลใบขนสินค้า <span class="badge">ส่วนที่ 1</span></h2>
        <div class="form-row">
          <div class="form-group">
            <label for="declaration-number">เลขที่ใบขน (Declaration No.)</label>
            <input type="text" id="declaration-number" name="declarationNumber" placeholder="A-XXXX-XXXX-XXXXXX" data-field="declarationNumber" />
          </div>
          <div class="form-group">
            <label for="declaration-type">ประเภทใบขน</label>
            <select id="declaration-type" name="declarationType" data-field="declarationType">
              <option value="">-- เลือก --</option>
              <option value="IMPORT">ขาเข้า (Import)</option>
              <option value="EXPORT">ขาออก (Export)</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="hs-code">พิกัดศุลกากร (HS Code)</label>
            <input type="text" id="hs-code" name="hsCode" placeholder="XXXX.XX.XX" data-field="hsCode" />
          </div>
          <div class="form-group">
            <label for="cif-price">ราคา CIF (บาท)</label>
            <input type="text" id="cif-price" name="cifPrice" placeholder="0.00" data-field="cifPrice" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>ข้อมูลเพิ่มเติม (iFrame) <span class="badge">ส่วนที่ 2 — ซ้อน iFrame</span></h2>
        <iframe id="nested-frame" srcdoc='
          <!DOCTYPE html>
          <html lang="th">
          <head>
            <style>
              body { font-family: "Segoe UI", Tahoma, sans-serif; padding: 16px; background: #fefefe; margin: 0; }
              .form-group { margin-bottom: 12px; }
              .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }
              .form-group input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
              .form-group input:focus { outline: none; border-color: #1a3c6e; }
              h3 { font-size: 13px; color: #1a3c6e; margin-bottom: 12px; }
            </style>
          </head>
          <body>
            <h3>รายละเอียดสินค้าภายใน iFrame</h3>
            <div class="form-group">
              <label for="item-desc">รายละเอียดสินค้า (Description)</label>
              <input type="text" id="item-desc" name="itemDescription" placeholder="Product description..." data-field="itemDescription" />
            </div>
            <div class="form-group">
              <label for="item-qty">จำนวน (Quantity)</label>
              <input type="text" id="item-qty" name="itemQuantity" placeholder="0" data-field="itemQuantity" />
            </div>
            <div class="form-group">
              <label for="item-weight">น้ำหนัก (Weight KG)</label>
              <input type="text" id="item-weight" name="itemWeight" placeholder="0.000" data-field="itemWeight" />
            </div>
          </body>
          </html>
        '></iframe>
      </div>
    </div>

    <div class="footer">
      Mock Page สำหรับทดสอบ VOLLOS Customs Guard AI Extension — ไม่ใช่เว็บกรมศุลกากรจริง
    </div>
  </body>
</html>
