version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options: { max-size: "10m", max-file: "3" }

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: saas-db
    restart: always
    shm_size: 1gb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ai_saas_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 2048M }
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s

  minio:
    image: minio/minio:latest
    container_name: saas-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits: { cpus: '0.2', memory: 128M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s

  minio-init:
    image: minio/mc:latest
    container_name: saas-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/vollos-dev;
      echo 'Bucket vollos-dev created';
      "

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits: { cpus: '0.2', memory: 512M }
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
