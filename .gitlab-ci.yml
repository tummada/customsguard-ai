# ==============================================================
# VOLLOS — GitLab CI/CD Pipeline
# ==============================================================
# Flow: test → build → deploy
# Deploy to production: push to main (manual trigger)
# ==============================================================

stages:
  - test
  - build
  - deploy

variables:
  # Docker image tag = short commit SHA
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$IMAGE_TAG
  BACKEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/backend:latest

# ─── Stage 1: Test ─────────────────────────────────────────

test-backend:
  stage: test
  image: eclipse-temurin:21-jdk-jammy
  script:
    - cd backend-core
    - ./gradlew build -x test --no-daemon
  cache:
    key: gradle-${CI_COMMIT_REF_SLUG}
    paths:
      - backend-core/.gradle/
      - backend-core/build/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

test-extension:
  stage: test
  image: node:22-slim
  script:
    - cd chrome-extension/cgai
    - npm ci
    - npm run test
    - npm run build
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - chrome-extension/cgai/node_modules/
  artifacts:
    paths:
      - chrome-extension/cgai/dist/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

# ─── Stage 2: Build Docker Image ──────────────────────────

build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend-core/Dockerfile.jvm -t $BACKEND_IMAGE -t $BACKEND_IMAGE_LATEST backend-core/
    - docker push $BACKEND_IMAGE
    - docker push $BACKEND_IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ─── Stage 3: Deploy to VPS ───────────────────────────────

deploy-production:
  stage: deploy
  image: alpine:latest
  when: manual
  environment:
    name: production
    url: https://api.vollos.ai
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER@$SSH_HOST << DEPLOY_SCRIPT
        cd /opt/vollos

        # Login to GitLab Container Registry
        docker login -u gitlab-ci-token -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 2>/dev/null || true

        # Backup current image before deploy
        docker tag vollos-backend:latest vollos-backend:backup-before-deploy 2>/dev/null || true

        # Pull latest image
        docker pull $BACKEND_IMAGE_LATEST || true

        # Update and restart
        docker compose -f docker-compose.prod.yml --env-file .env.production up -d backend

        # Wait for health
        echo "Waiting for backend..."
        for i in \$(seq 1 20); do
          if docker exec vollos-backend curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
            echo "Deploy OK!"
            docker image prune -f
            exit 0
          fi
          sleep 5
        done
        echo "Deploy failed — backend not healthy"
        exit 1
      DEPLOY_SCRIPT
  variables:
    BACKEND_IMAGE_LATEST: $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
